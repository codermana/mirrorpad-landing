<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="70%" stop-color="#E67E22"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="stylusBody" x1="0" x2="1">
      <stop offset="0%" stop-color="#F7F7F5"/>
      <stop offset="100%" stop-color="#E7E7E2"/>
    </linearGradient>
  </defs>
  <!-- pad -->
  <rect x="84" y="92" width="344" height="328" rx="56" fill="url(#g2)"/>
  <path d="M318 92v328" stroke="#FFF8EE" stroke-width="10" opacity="0.78"/>
  <path d="M318 92c18 28 44 50 76 68v192c-32-18-58-40-76-68z" fill="#D4AF37" opacity="0.88"/>
  <rect x="84" y="92" width="344" height="328" rx="56" fill="none" stroke="#1F2937" stroke-opacity="0.12" stroke-width="8"/>

  <!-- writing lines -->
  <path d="M136 164h120" stroke="#FFF8EE" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M136 208h92" stroke="#FFF8EE" stroke-width="14" stroke-linecap="round" opacity="0.45"/>

  <!-- internal upright stylus -->
  <g transform="translate(330,128)">
    <!-- shadow -->
    <rect x="8" y="8" width="18" height="228" rx="9" fill="#1F2937" opacity="0.08"/>
    <!-- body -->
    <rect x="0" y="0" width="18" height="228" rx="9" fill="url(#stylusBody)" stroke="#1F2937" stroke-opacity="0.12" stroke-width="3"/>
    <!-- subtle highlight -->
    <rect x="4" y="12" width="2.5" height="190" rx="1.25" fill="#FFFFFF" opacity="0.6"/>
    <!-- top cap -->
    <rect x="2" y="-6" width="14" height="18" rx="7" fill="#F3F3EF" stroke="#1F2937" stroke-opacity="0.08" stroke-width="2"/>
    <!-- white tip transition -->
    <path d="M0 228h18l-4.5 15H4.5z" fill="#F3F3EF" stroke="#1F2937" stroke-opacity="0.08" stroke-width="2"/>
    <!-- white nib -->
